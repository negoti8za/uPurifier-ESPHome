# ─────────────────────────────────────────────────────────────────────────────
# uPurifier — Förnuftig  (ESPHome edition, 2026)
#
# Hardware: IKEA Förnuftig + custom ESP8266 PCB (ESP-12F)
#
# Verified pin mapping (confirmed by hardware test):
#   GPIO5  → PWM  — Fan PWM speed control (constant 50% duty, variable freq 1-300 Hz)
#   GPIO4  → FG   — Fan tachometer feedback
#   GPIO12 → D3   — Error indicator LED (ESPHome status_led: off=OK, blink=fault)
#   GPIO13 → SW   — User button (single, cycles speed)
#   GPIO14 → D2   — Power LED (always ON while device is running)
#   GPIO0  → FLASH button (boot mode)
#   GPIO2  → must be HIGH at boot (leave floating or pull-up)
#
# NOTE: esp12e board type in ESPHome covers ESP-12F — same chip, same pinout.
#
# First-time flash: USB + ESPHome dashboard or:
#   esphome compile fornuftig.yaml
#   .bin → .esphome/build/upurifier-fornuftig/.pioenvs/upurifier-fornuftig/firmware.bin
# Subsequent updates: OTA via WiFi.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  device_name:    upurifier-fornuftig
  friendly_name:  "Förnuftig Air Purifier"

# ── Core ────────────────────────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}   # ← becomes the HA device name
  project:
    name: "horvathgergo.uPurifier"
    version: "1.0.0"

esp8266:
  # esp12e covers ESP-12E and ESP-12F (identical pinout)
  board: esp12e
  restore_from_flash: false

logger:
  level: INFO

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid:          !secret wifi_ssid
  password:      !secret wifi_password
  min_auth_mode: WPA2   # require WPA2 (AES); change to WPA only if your router is very old
  ap:
    ssid:     "uPurifier-Setup"
    password: "micropythoN"

captive_portal:

mqtt:
  broker:           !secret mqtt_broker
  port:             1883
  username:         !secret mqtt_username
  password:         !secret mqtt_password
  discovery:        true
  discovery_prefix: homeassistant

# ─────────────────────────────────────────────────────────────────────────────
# Lights / LEDs
#   GPIO12 — D3 error LED (ESPHome status_led: off=OK, blink=fault)
#   GPIO14 — D2 power LED (always on when running)
# Outputs
#   GPIO5  — Fan PWM (50% duty, variable frequency 1-300 Hz)
# ───────────────────────────────────────────────────────────────────────────────
light:
  - platform: status_led
    name:     "Error LED"
    internal: true
    pin:
      number:   GPIO12
      inverted: false

output:
  # ── Fan PWM on GPIO5 ──────────────────────────────────────────────────────
  - platform: esp8266_pwm
    id:        fan_pwm_output
    pin:       GPIO5
    frequency: 1 Hz            # overridden at runtime by apply_fan_pwm script

# ───────────────────────────────────────────────────────────────────────────────
# D2 Power LED — follows fan state (on=running, off=stopped)
# ───────────────────────────────────────────────────────────────────────────────
switch:
  - platform:     gpio
    id:           power_led_switch
    name:         "Power LED"
    internal:     true
    pin:          GPIO14
    restore_mode: ALWAYS_OFF  # controlled by apply_fan_pwm: on=fan running, off=fan off

# ─────────────────────────────────────────────────────────────────────────────
# Script — sets PWM frequency + duty for the current fan speed.
#
# Speed → PWM mapping (matches original firmware behaviour):
#   OFF → 1 Hz,   0 % duty
#   1   → 152 Hz, 50 % duty  (low)
#   2   → 225 Hz, 50 % duty  (medium)
#   3   → 300 Hz, 50 % duty  (high)
# ─────────────────────────────────────────────────────────────────────────────
script:
  - id: apply_fan_pwm
    then:
      - lambda: |-
          if (!id(purifier_fan).state) {
            id(fan_pwm_output).update_frequency(1);
            id(fan_pwm_output).set_level(0.0);
            id(power_led_switch).turn_off();
            return;
          }
          int spd = id(purifier_fan).speed;
          if      (spd == 1) { id(fan_pwm_output).update_frequency(id(low_freq_val));  }
          else if (spd == 2) { id(fan_pwm_output).update_frequency(id(med_freq_val));  }
          else               { id(fan_pwm_output).update_frequency(id(high_freq_val)); }
          id(fan_pwm_output).set_level(0.5);
          id(power_led_switch).turn_on();

# ─────────────────────────────────────────────────────────────────────────────
# Fan entity
#
# Name is set to "Fan" (not the full device name) so HA displays it as:
#   "Förnuftig Air Purifier"  ← device name (from friendly_name above)
# rather than the doubled "Förnuftig Air Purifier Förnuftig Air Purifier"
# that occurs when entity name == device name in HA 2023.8+.
# ─────────────────────────────────────────────────────────────────────────────
globals:
  - id:            btn_cycle
    type:          int
    restore_value: no
    initial_value: '0'

  # Custom PWM frequencies for each speed level.
  # Stored in flash — survive reboots and are editable from HA.
  - id:            low_freq_val
    type:          int
    restore_value: yes
    initial_value: '152'

  - id:            med_freq_val
    type:          int
    restore_value: yes
    initial_value: '225'

  - id:            high_freq_val
    type:          int
    restore_value: yes
    initial_value: '300'

fan:
  - platform:      template
    id:            purifier_fan
    name:          "Fan"        # ← short name; HA prefixes device name automatically
    speed_count:   3
    restore_mode:  ALWAYS_OFF
    on_turn_on:
      - script.execute: apply_fan_pwm
    on_turn_off:
      - script.execute: apply_fan_pwm
    on_speed_set:
      - script.execute: apply_fan_pwm

# ─────────────────────────────────────────────────────────────────────────────
# Configurable speed levels (visible in HA under device → Controls)
# Adjust these to tune the fan motor for your specific unit.
# Changes take effect immediately and are stored in flash.
# ─────────────────────────────────────────────────────────────────────────────
number:
  - platform: template
    name:            "Low Speed Frequency"
    id:              low_freq
    min_value:       50
    max_value:       300
    step:            1
    initial_value:   152
    restore_value:   true
    optimistic:      true
    unit_of_measurement: "Hz"
    entity_category: config
    icon:            mdi:fan-speed-1
    set_action:
      - globals.set:
          id:    low_freq_val
          value: !lambda 'return (int)x;'
      - script.execute: apply_fan_pwm

  - platform: template
    name:            "Medium Speed Frequency"
    id:              med_freq
    min_value:       50
    max_value:       300
    step:            1
    initial_value:   225
    restore_value:   true
    optimistic:      true
    unit_of_measurement: "Hz"
    entity_category: config
    icon:            mdi:fan-speed-2
    set_action:
      - globals.set:
          id:    med_freq_val
          value: !lambda 'return (int)x;'
      - script.execute: apply_fan_pwm

  - platform: template
    name:            "High Speed Frequency"
    id:              high_freq
    min_value:       50
    max_value:       300
    step:            1
    initial_value:   300
    restore_value:   true
    optimistic:      true
    unit_of_measurement: "Hz"
    entity_category: config
    icon:            mdi:fan-speed-3
    set_action:
      - globals.set:
          id:    high_freq_val
          value: !lambda 'return (int)x;'
      - script.execute: apply_fan_pwm

# ─────────────────────────────────────────────────────────────────────────────
# Physical button — GPIO13 (SW)
# Each press: OFF → Low → Medium → High → OFF
# ─────────────────────────────────────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number:   GPIO13
      inverted: true
      mode:     INPUT_PULLUP
    name:     "Button"
    internal: true
    filters:
      - delayed_on:  50ms
      - delayed_off: 50ms
    on_press:
      - lambda: 'id(btn_cycle) = (id(btn_cycle) + 1) % 4;'
      - if:
          condition:
            lambda: 'return id(btn_cycle) == 0;'
          then:
            - fan.turn_off: purifier_fan
      - if:
          condition:
            lambda: 'return id(btn_cycle) == 1;'
          then:
            - fan.turn_on:
                id: purifier_fan
                speed: 1   # Low
      - if:
          condition:
            lambda: 'return id(btn_cycle) == 2;'
          then:
            - fan.turn_on:
                id: purifier_fan
                speed: 2   # Medium
      - if:
          condition:
            lambda: 'return id(btn_cycle) == 3;'
          then:
            - fan.turn_on:
                id: purifier_fan
                speed: 3   # High

# ─────────────────────────────────────────────────────────────────────────────
# Diagnostics
# ─────────────────────────────────────────────────────────────────────────────
sensor:
  # Fan tachometer — GPIO4 (FG)
  # Counts pulses per second; fan outputs 2 pulses/revolution.
  - platform:        pulse_counter
    pin:
      number:   GPIO4
      mode:     INPUT_PULLUP
    name:            "Fan Speed"
    unit_of_measurement: "RPM"
    update_interval: 10s
    entity_category: diagnostic
    filters:
      # FG = 2 pulses per revolution → divide by 2 to get RPM
      - lambda: 'return x / 2.0;'

  - platform: wifi_signal
    name:            "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name:            "Uptime"
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name:            "IP Address"
      entity_category: diagnostic
